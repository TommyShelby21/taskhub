version: "3.8"

services:

  db:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: taskhub
      POSTGRES_USER: tomas
      POSTGRES_PASSWORD: tomas
    expose:
      - "5432"

  backend:
    build:
      context: .
    command: >
      sh -c "gunicorn backend.wsgi:application --bind 0.0.0.0:60000"
    volumes:
      - static_volume:/app/staticfiles
    environment:
      - DATABASE_URL=postgres://tomas:tomas@db:5432/taskhub
      - DJANGO_SETTINGS_MODULE=backend.production
    depends_on:
      - db
    expose:
      - "60000"

  frontend:
    build:
      context: ./vue
    expose:
      - "80"

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/staticfiles
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_volume:
